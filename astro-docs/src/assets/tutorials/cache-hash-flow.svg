<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 680 200"><style>text{font-family:ui-monospace,&apos;Cascadia Code&apos;,&apos;Source Code Pro&apos;,Menlo,Consolas,monospace}</style><text x="90" y="18" fill="#64748B" font-size="11" font-weight="600" letter-spacing=".05em" text-anchor="middle">INPUTS</text><rect width="160" height="30" x="10" y="28" fill="#1E293B" stroke="#475569" stroke-width="1.5" rx="6"/><text x="90" y="48" fill="#94A3B8" font-size="12" text-anchor="middle">source files</text><rect width="160" height="30" x="10" y="64" fill="#1E293B" stroke="#475569" stroke-width="1.5" rx="6"/><text x="90" y="84" fill="#94A3B8" font-size="12" text-anchor="middle">config files</text><rect width="160" height="30" x="10" y="100" fill="#1E293B" stroke="#475569" stroke-width="1.5" rx="6"/><text x="90" y="120" fill="#94A3B8" font-size="12" text-anchor="middle">external deps</text><rect width="160" height="30" x="10" y="136" fill="#1E293B" stroke="#475569" stroke-width="1.5" rx="6"/><text x="90" y="156" fill="#94A3B8" font-size="12" text-anchor="middle">CLI flags</text><path stroke="#475569" stroke-linecap="round" stroke-width="1.5" marker-end="url(#arrow)" d="M185 96 L240 96"/><rect width="150" height="52" x="255" y="70" fill="#3B82F6" rx="8"/><text x="330" y="93" fill="#fff" font-size="13" font-weight="600" text-anchor="middle">unique hash</text><text x="330" y="110" fill="#BFDBFE" font-size="11" text-anchor="middle">abc123def...</text><path stroke="#475569" stroke-linecap="round" stroke-width="1.5" marker-end="url(#arrow)" d="M420 96 L475 96"/><text x="570" y="18" fill="#64748B" font-size="11" font-weight="600" letter-spacing=".05em" text-anchor="middle">CACHE LOOKUP</text><rect width="180" height="38" x="490" y="38" fill="#1E293B" stroke="#22C55E" stroke-width="1.5" rx="6"/><text x="520" y="62" fill="#22C55E" font-size="12" font-weight="600">HIT</text><text x="610" y="62" fill="#94A3B8" font-size="11" text-anchor="middle">replay output</text><rect width="180" height="38" x="490" y="88" fill="#1E293B" stroke="#F59E0B" stroke-width="1.5" rx="6"/><text x="524" y="112" fill="#F59E0B" font-size="12" font-weight="600">MISS</text><text x="614" y="112" fill="#94A3B8" font-size="11" text-anchor="middle">run, then store</text><text x="340" y="190" fill="#64748B" font-size="11" font-style="italic" text-anchor="middle">same inputs = same hash = cache hit</text><defs><marker id="arrow" markerHeight="6" markerWidth="6" orient="auto-start-reverse" refX="9" refY="5" viewBox="0 0 10 10"><path fill="#475569" d="M 0 0 L 10 5 L 0 10 z"/></marker></defs></svg>